{% extends "base.html" %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='style_register.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <img src="{{ url_for('static', filename='A.png') }}" alt="Logo" class="logo">
        <h2>สมัครสมาชิก</h2>

        <form id="register-form">
            <div class="input-container">
                <i class="fa fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-container">
                <i class="fa fa-user"></i>
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="input-container">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="input-container">
                <i class="fa fa-lock"></i>
                <input type="password" id="confirm-password" placeholder="Confirm Password" required>
            </div>

            <button type="submit" class="btn-main">สมัครสมาชิก</button>
        </form>

        <p class="bottom-text">
            มีบัญชีแล้ว? <a href="{{ url_for('frontend.login') }}">เข้าสู่ระบบ</a>
        </p>
    </div>
</div>

<!-- ✅ Custom Modal -->
<div id="successModal" class="modal">
  <div class="modal-content">
    <h2>✅ สมัครสมาชิกสำเร็จ!</h2>
    <p>ไปเข้าสู่ระบบกันเลยนะครับ</p>
    <button id="modal-ok">ไปเข้าสู่ระบบ</button>
  </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const pass = document.getElementById('password').value;
    const confirmPass = document.getElementById('confirm-password').value;

    if (pass !== confirmPass) {
        alert("Password ไม่ตรงกัน");
        return;
    }

    fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email: document.getElementById('email').value,
            username: document.getElementById('username').value,
            password: pass
        })
    })
    .then(async res => {
        const data = await res.json().catch(() => null);
        if (res.ok && data && (data.status || data.message === "User registered successfully!")) {
            document.getElementById('successModal').style.display = 'flex';
            document.getElementById('modal-ok').onclick = () => window.location.href = "{{ url_for('frontend.login') }}";
        } else if (data && (data.message || data.error)) {
            alert(data.message || data.error);
        } else {
            alert("เกิดข้อผิดพลาดบางอย่าง");
        }
    })
    .catch(err => {
        console.error(err);
        alert("เกิดข้อผิดพลาดจากระบบ");
    });
});
</script>

<style>
.modal {
  display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center;
}
.modal-content {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  text-align: center;
  color: white;
}
.modal-content h2 { color: #00ffff; margin-bottom: 15px; }
.modal-content button {
  padding: 10px 30px; border: none; border-radius: 30px;
  background: linear-gradient(to right, #f72585, #7209b7);
  color: white; font-weight: bold; font-size: 16px;
  box-shadow: 0 0 10px rgba(255,255,255,0.4);
  cursor: pointer;
}
</style>
{% endblock %}
