{% extends "base.html" %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='style_login.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <img src="{{ url_for('static', filename='A.png') }}" alt="Logo" class="logo">
        <h2>เข้าสู่ระบบ</h2>

        <form id="login-form">
            <div class="input-container">
                <i class="fa fa-user"></i>
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="input-container">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="remember">
                <label><input type="checkbox" id="remember"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-main">เข้าสู่ระบบ</button>
        </form>

        <p class="bottom-text">
            ยังไม่มีบัญชี? <a href="{{ url_for('frontend.register') }}">สมัครสมาชิก</a>
        </p>
    </div>
</div>

<!-- ✅ Custom Modal -->
<div id="successModal" class="modal">
  <div class="modal-content">
    <h2>✅ เข้าสู่ระบบสำเร็จ!</h2>
    <p>ไปหน้าแดชบอร์ดกันเลยนะครับ</p>
    <button id="modal-ok">ไปแดชบอร์ด</button>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();

    fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    })
    .then(async res => {
        const data = await res.json().catch(() => null);
        if (res.ok && data && data.token) {
            localStorage.setItem("token", data.token);
            document.getElementById('successModal').style.display = 'flex';
            document.getElementById('modal-ok').onclick = () => window.location.href = "/";
        } else if (data && data.message) {
            alert(data.message);
        } else {
            alert("เกิดข้อผิดพลาดบางอย่าง");
        }
    })
    .catch(err => {
        console.error(err);
        alert("เกิดข้อผิดพลาดจากระบบ");
    });
});
</script>

<style>
.modal {
  display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center;
}
.modal-content {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  text-align: center;
  color: white;
}
.modal-content h2 { color: #00ffff; margin-bottom: 15px; }
.modal-content button {
  padding: 10px 30px; border: none; border-radius: 30px;
  background: linear-gradient(to right, #f72585, #7209b7);
  color: white; font-weight: bold; font-size: 16px;
  box-shadow: 0 0 10px rgba(255,255,255,0.4);
  cursor: pointer;
}
</style>
{% endblock %}
