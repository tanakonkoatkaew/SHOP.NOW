{% extends "base.html" %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='style_topup_logs.css') }}">
<style>
body {
    background-color: #000000;
    color: white;
    font-family: 'Prompt', sans-serif;
}
.container {
    max-width: 1200px;
    margin: 50px auto;
    text-align: center;
}
h1 {
    font-size: 32px;
    margin-bottom: 40px;
    color: #66fcf1;
    text-shadow: 0 0 8px #00ffff;
}
#logs-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}
.log-card {
    background: #1e293b;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
    width: 280px;
    transition: transform 0.2s;
}
.log-card:hover {
    transform: scale(1.03);
}
.log-card p {
    font-size: 16px;
    color: #eee;
    margin: 6px 0;
}
.empty-message {
    font-size: 20px;
    color: #aaa;
    margin-top: 80px;
}
.empty-message span {
    display: inline-block;
    margin-top: 10px;
    color: #66fcf1;
    font-weight: 500;
}
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1>ประวัติการเติมเงิน</h1>
    <div id="logs-container">
        กำลังโหลดข้อมูล...
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    const token = localStorage.getItem("token");
    const container = document.getElementById("logs-container");

    if (!token) {
        container.innerHTML = `<div class="empty-message">⛔ กรุณาเข้าสู่ระบบก่อน</div>`;
        return;
    }

    
    fetch('/api/payment/me/topup/logs', {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(res => res.json())
    .then(data => {
        if (data.status) {
            const logs = data.results;

            if (logs.length === 0) {
                container.innerHTML = `
                    <div class="empty-message">
                        🧾 ยังไม่มีประวัติการเติมเงิน<br>
                        <span>ไปเติมเงินกันเถอะ!</span>
                    </div>
                `;
                return;
            }

            const html = logs.map(log => `
                <div class="log-card">
                    <p>💳 ยอดเติม: <strong>${log.amount} ฿</strong></p>
                    <p>📅 วันที่: ${log.created_at}</p>
                    <p>📦 สถานะ: ${log.status}</p>
                </div>
            `).join("");
            container.innerHTML = html;
        } else {
            container.innerHTML = `<div class="empty-message">❌ โหลดข้อมูลล้มเหลว</div>`;
        }
    })
    .catch(err => {
        console.error(err);
        container.innerHTML = `<div class="empty-message">❌ เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
    });
});
</script>
{% endblock %}
