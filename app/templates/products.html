{% extends "base.html" %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='style_products.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container">
    <div class="product-section">
        <h1>สินค้าในระบบ</h1>
        <div id="product-container" class="product-container">
            กำลังโหลดสินค้า...
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    const token = localStorage.getItem("token");

    fetch("/api/products/product", {
        headers: token ? { "Authorization": `Bearer ${token}` } : {}
    })
    .then(async res => {
        if (!res.ok) throw new Error("โหลดสินค้าล้มเหลว");
        return await res.json();
    })
    .then(data => {
        const container = document.getElementById("product-container");

        if (data.status && data.results.length > 0) {
            const html = data.results.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} ฿</div>
                    <p class="description">${p.description || "ไม่มีรายละเอียดสินค้า"}</p>
                    <div class="spacer"></div>
                    <a href="/product/${p.cate}/${p.id}" class="btn-buy">ดูรายละเอียด</a>
                </div>
            `).join("");
            container.innerHTML = html;
        } else {
            container.innerText = "ไม่มีสินค้าในระบบ";
        }
    })
    .catch(err => {
        console.error("Product fetch error:", err);
        document.getElementById("product-container").innerText = "กรุณาเข้าสู่ระบบก่อน";
    });
});
</script>
{% endblock %}
