{% extends "base.html" %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='style_home.css') }}">
{% endblock %}


{% block content %}
<div class="container">
    <div class="hero">
        <h1>ONLINE STORE</h1>
        <p>ระบบร้านค้าออนไลน์ เติมเงิน-จำหน่ายสินค้า</p>
        <a href="{{ url_for('frontend.products') }}" class="btn-main">ดูสินค้าทั้งหมด</a>
    </div>

    <div class="product-section">
        <h2>สินค้าแนะนำ</h2>
        <div class="product-container">
            {% for product in products %}
            <div class="product-card">
                <img src="{{ product.image }}" alt="{{ product.name }}">
                <h3>{{ product.name }}</h3>
                <div class="price">{{ product.price }} ฿</div>
                <a href="{{ url_for('frontend.products') }}" class="btn-buy">ดูรายละเอียด</a>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
